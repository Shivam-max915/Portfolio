<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Somnath Waghe - Web Developer</title>
    <meta property="og:description" content="Check out my web development projects, modern UI/UX components, and technical skills." />
    <meta property="og:image" content="https://vercel.app/Shivam.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('contextmenu', function (e) {
        e.preventDefault()
      })

      document.addEventListener('keydown', function (e) {
        var key = e.key.toUpperCase()
        var forbidden = e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && (key === 'I' || key === 'J' || key === 'C')) ||
          (e.ctrlKey && key === 'U') ||
          (e.ctrlKey && key === 'S') ||
          (e.metaKey && e.shiftKey && key === 'I')

        if (forbidden) {
          e.preventDefault()
          e.stopPropagation()
        }
      })

      document.addEventListener('copy', function (e) {
        e.preventDefault()
      })

      document.addEventListener('selectstart', function (e) {
        e.preventDefault()
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
